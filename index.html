<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;">
  <title>Vestiaire Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #111318;
      --bg2:     #1a1d24;
      --bg3:     #20242f;
      --border:  #2a2e3d;
      --accent:  #7c6af7;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --text:    #e2e8f0;
      --text2:   #94a3b8;
      --text3:   #4e5870;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header .logo { font-size: 18px; }
    header h1    { font-size: 15px; font-weight: 600; }
    header .badge {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--accent);
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
    }
    header .spacer { flex: 1; }
    header .stat {
      font-size: 11px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    header .stat span { color: var(--text2); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .section-header {
      padding: 14px 16px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
    }

    /* Form */
    .add-form {
      padding: 0 14px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fg label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 3px;
    }
    .fg input, .fg select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .fg input::placeholder { color: var(--text3); }
    .fg input:focus, .fg select:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* Filter list */
    .filter-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text3);
      gap: 6px;
      font-size: 12px;
      padding: 20px 0;
    }
    .filter-empty .icon { font-size: 28px; }

    .filter-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }
    .filter-card.running { border-color: #1f6b40; }

    .fc-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }
    .fc-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.running {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    .status-dot.stopped { background: var(--red); }

    .fc-query {
      font-size: 11px;
      color: var(--text3);
      background: var(--bg2);
      padding: 2px 7px;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: inline-block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .fc-interval {
      font-size: 10px;
      color: var(--text3);
      margin-top: 4px;
    }
    .fc-controls {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 5px 10px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-play   { background: #166534; color: #86efac; }
    .btn-stop   { background: #7f1d1d; color: #fca5a5; }
    .btn-delete { background: transparent; border: 1px solid var(--border); color: var(--text3); padding: 5px 8px; }
    .btn-delete:hover { border-color: var(--red); color: var(--red); opacity: 1; }

    /* ── Main area ── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      flex-shrink: 0;
    }
    .tab {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
      position: relative;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      padding: 0 4px;
      margin-left: 5px;
    }

    /* Panels */
    .tab-panel {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      flex-direction: column;
      gap: 8px;
    }
    .tab-panel.active { display: flex; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      gap: 8px;
      font-size: 12px;
    }
    .empty-state .icon { font-size: 36px; }

    /* Product cards */
    .product-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .product-price {
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
    }
    .product-filter-badge {
      font-size: 10px;
      color: var(--text3);
      background: var(--bg3);
      padding: 1px 7px;
      border-radius: 8px;
    }
    .product-time {
      font-size: 10px;
      color: var(--text3);
      margin-left: auto;
    }
    .btn-link {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .btn-link:hover { background: var(--accent); color: #fff; }

    /* Log panel */
    #log-panel {
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 11px;
      color: var(--text2);
      line-height: 1.7;
      display: flex;
      flex-direction: column;
    }
    .log-entry { padding: 1px 0; }
    .log-entry.warn  { color: var(--yellow); }
    .log-entry.error { color: var(--red); }
    .log-entry.success { color: var(--green); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <header>
    <span class="logo">🛍️</span>
    <h1>Vestiaire Monitor</h1>
    <span class="badge">Desktop</span>
    <div class="spacer"></div>
    <div class="stat">Filtros activos: <span id="stat-running">0</span></div>
    <div class="stat" style="margin-left:16px;">Productos: <span id="stat-products">0</span></div>
  </header>

  <div class="layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="section-header">Nuevo filtro</div>

      <div class="add-form">
        <div class="fg">
          <label>Nombre</label>
          <input type="text" id="input-name" placeholder="Ej. Balenciaga runners">
        </div>
        <div class="fg">
          <label>Búsqueda (query)</label>
          <input type="text" id="input-query" placeholder="Ej. balenciaga sneakers">
        </div>
        <div class="fg">
          <label>Intervalo de comprobación</label>
          <select id="input-interval">
            <option value="15000">15 segundos</option>
            <option value="30000" selected>30 segundos</option>
            <option value="60000">1 minuto</option>
            <option value="120000">2 minutos</option>
            <option value="300000">5 minutos</option>
          </select>
        </div>
        <button class="btn-add" id="btn-add">+ Añadir filtro</button>
      </div>

      <div class="section-header" style="margin-top:4px;">Mis filtros</div>

      <div class="filter-list" id="filter-list">
        <div class="filter-empty" id="empty-filters">
          <span class="icon">🔍</span>
          <span>Añade un filtro para empezar</span>
        </div>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main-area">

      <div class="tabs">
        <div class="tab active" data-tab="products">
          Productos detectados
          <span class="tab-badge" id="badge-products" style="display:none">0</span>
        </div>
        <div class="tab" data-tab="logs">Logs</div>
      </div>

      <div class="tab-panel active" id="panel-products">
        <div class="empty-state" id="empty-products">
          <span class="icon">📦</span>
          <span>Los nuevos productos aparecerán aquí</span>
          <span style="margin-top:4px;font-size:11px;">Inicia un filtro con ▶ Play para comenzar</span>
        </div>
      </div>

      <div class="tab-panel" id="panel-logs">
        <div id="log-panel"></div>
      </div>

    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
